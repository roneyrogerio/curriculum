apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: curriculum
  namespace: curriculum
  labels:
    app.kubernetes.io/name: curriculum
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: curriculum
          image: ghcr.io/roneyrogerio/curriculum:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
