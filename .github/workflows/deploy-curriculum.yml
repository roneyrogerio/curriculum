name: Deploy Curriculum

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: curriculum-k8s-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build image and deploy to Kubernetes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="ghcr.io/${OWNER_LC}/curriculum"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_sha }}
            ${{ steps.meta.outputs.image_base }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          : "${OCI_PRIVATE_KEY:?OCI_PRIVATE_KEY secret is required}"
          : "${OCI_USER:?OCI_USER secret is required}"
          : "${OCI_FINGERPRINT:?OCI_FINGERPRINT secret is required}"
          : "${OCI_TENANCY:?OCI_TENANCY secret is required}"
          : "${OCI_REGION:?OCI_REGION secret is required}"
          mkdir -p "$HOME/.oci"
          printf "%s\n" "$OCI_PRIVATE_KEY" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER" "$OCI_FINGERPRINT" "$OCI_TENANCY" "$OCI_REGION" "$HOME/.oci/oci_api_key.pem" > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"

      - name: Install OCI CLI
        shell: bash
        run: |
          python -m pip install --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure kubeconfig from OKE
        shell: bash
        env:
          OKE_CLUSTER_ID: ${{ secrets.OKE_CLUSTER_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          : "${OKE_CLUSTER_ID:?OKE_CLUSTER_ID secret is required}"
          : "${OCI_REGION:?OCI_REGION secret is required}"
          mkdir -p "$HOME/.kube"
          oci ce cluster create-kubeconfig \
            --cluster-id "$OKE_CLUSTER_ID" \
            --file "$HOME/.kube/config" \
            --region "$OCI_REGION" \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT
          chmod 600 "$HOME/.kube/config"

      - name: Create GHCR pull secret
        shell: bash
        env:
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_EMAIL: ${{ secrets.GHCR_EMAIL }}
        run: |
          : "${GHCR_USER:?GHCR_USER secret is required}"
          : "${GHCR_TOKEN:?GHCR_TOKEN secret is required}"
          : "${GHCR_EMAIL:?GHCR_EMAIL secret is required}"
          kubectl create namespace curriculum --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USER" \
            --docker-password="$GHCR_TOKEN" \
            --docker-email="$GHCR_EMAIL" \
            -n curriculum \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        shell: bash
        run: |
          kubectl apply -f deploy/namespace.yaml
          kubectl apply -f deploy/cluster-domain-claim.yaml
          kubectl apply -f deploy/domain-mapping.yaml
          sed -E "s|^([[:space:]]*image:[[:space:]]*).*$|\\1${{ steps.meta.outputs.image_sha }}|" deploy/curriculum.yaml | kubectl apply -f -
          kubectl -n curriculum wait ksvc/curriculum --for=condition=Ready --timeout=180s
